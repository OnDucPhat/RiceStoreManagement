spring.config.import=optional:file:.env[.properties]

# Safe-to-commit defaults. Override sensitive values with environment variables.

# Frontend / CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

# JWT
app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_TO_A_SECURE_SECRET_KEY_AT_LEAST_256_BITS_LONG_FOR_PRODUCTION}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# Reverse proxy
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# Messenger
meta.webhook.verify-token=${META_WEBHOOK_VERIFY_TOKEN:CHANGE_ME}
meta.webhook.callback-url=${META_WEBHOOK_CALLBACK_URL:}
meta.graph.base-url=${META_GRAPH_BASE_URL:https://graph.facebook.com/v19.0}
meta.graph.page-access-token=${META_GRAPH_PAGE_ACCESS_TOKEN:}

# AI
ai.provider=${AI_PROVIDER:openai}

ai.openai.base-url=${AI_OPENAI_BASE_URL:https://api.openai.com/v1}
ai.openai.key=${AI_OPENAI_KEY:}
ai.openai.model=${AI_OPENAI_MODEL:gpt-4o-mini}

ai.gemini.base-url=${AI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
ai.gemini.key=${AI_GEMINI_KEY:}
ai.gemini.model=${AI_GEMINI_MODEL:gemini-1.5-flash}

ai.timeout.connect-ms=${AI_TIMEOUT_CONNECT_MS:120000}
ai.timeout.read-ms=${AI_TIMEOUT_READ_MS:120000}
ai.parse.system-prompt=${AI_PARSE_SYSTEM_PROMPT:You are a friendly Vietnamese AI assistant for a rice store. Classify each customer message and return only JSON with keys: intent, rice_type, quantity, address, customer_phone, reply. intent must be ORDER_CREATE when the user wants to buy/order rice. intent must be GENERAL_CHAT for greetings, questions, rice recommendations, and non-order conversation. Use empty strings for missing order fields. If ORDER_CREATE is missing rice_type, quantity, address, or customer_phone, reply in natural Vietnamese asking only for the missing information. If ORDER_CREATE is complete, reply in natural Vietnamese summarizing the order and asking whether the customer wants to order anything else. Do not tell the customer the order is finalized unless they explicitly confirmed it. If GENERAL_CHAT, reply as a helpful rice store assistant in Vietnamese. When recommending rice, use only the provided rice catalog and mention prices from the catalog when useful. Keep reply concise, warm, and practical. When asking for missing information, include a concrete example in your reply to guide the customer on what format to provide. Examples: - If asking for address: "VD: giao ở 176 quốc 50, khu phố tân xuân, cần giuộc" - If asking for name: "VD: tên tôi là Phát" - If asking for phone: "VD: 0123456789" - If asking for rice type and quantity: "VD: 2 bao gạo ST25" or "VD: 5kg gạo Thơm Thái"}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
