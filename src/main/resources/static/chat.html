<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đặt gạo nhanh</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211d;
      --muted: #617069;
      --line: #d9e1dc;
      --surface: #fbfcfa;
      --panel: #ffffff;
      --brand: #2f5d50;
      --brand-strong: #23463d;
      --accent: #c48b2c;
      --bot: #eef6f1;
      --user: #2f5d50;
      font-family: Arial, "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--surface);
      color: var(--ink);
    }

    .shell {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      max-width: 760px;
      margin: 0 auto;
      background: var(--panel);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 72px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(238, 246, 241, 0.85), rgba(255, 255, 255, 0) 160px),
        var(--surface);
    }

    .message {
      width: fit-content;
      max-width: min(86%, 560px);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 1px 2px rgba(17, 24, 20, 0.06);
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot);
      border: 1px solid #d4e7dc;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: #ffffff;
    }

    .message.pending {
      color: var(--muted);
      font-style: italic;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 18px 12px;
      background: var(--surface);
      border-top: 1px solid var(--line);
    }

    .chip {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .chip:active {
      transform: translateY(1px);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--line);
      background: #ffffff;
    }

    textarea {
      width: 100%;
      min-height: 52px;
      max-height: 132px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      font: inherit;
      font-size: 16px;
      line-height: 1.35;
      color: var(--ink);
      outline: none;
    }

    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(47, 93, 80, 0.16);
    }

    .send {
      min-width: 96px;
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .send:hover {
      background: var(--brand-strong);
    }

    .send:disabled,
    textarea:disabled {
      opacity: 0.64;
      cursor: wait;
    }

    .toast {
      display: none;
      padding: 10px 18px 0;
      color: #8a4b16;
      font-size: 14px;
      line-height: 1.35;
      background: #ffffff;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 520px) {
      .shell {
        border: 0;
      }

      .topbar {
        padding: 12px 14px;
      }

      .messages {
        padding: 14px;
      }

      .quick-actions {
        padding: 0 14px 10px;
      }

      .composer {
        grid-template-columns: 1fr;
        padding: 10px 14px 14px;
      }

      .send {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <img class="brand-mark" src="/rice-chat-mark.svg" alt="">
      <div class="title">
        <h1>Đặt gạo nhanh</h1>
        <p>Cửa hàng gạo gia đình</p>
      </div>
    </header>

    <section id="messages" class="messages" aria-live="polite"></section>

    <section class="quick-actions" aria-label="Tin nhắn nhanh">
      <button class="chip" type="button" data-message="Tôi muốn đặt gạo">Đặt gạo</button>
      <button class="chip" type="button" data-message="Tư vấn giúp tôi loại gạo ngon dễ ăn">Tư vấn</button>
      <button class="chip" type="button" data-message="Cho tôi xem các loại gạo đang bán">Xem loại gạo</button>
    </section>

    <div id="toast" class="toast"></div>

    <form id="composer" class="composer">
      <textarea id="messageInput" rows="1" placeholder="Nhắn loại gạo, số kg, địa chỉ, SĐT..." autocomplete="off"></textarea>
      <button id="sendButton" class="send" type="submit">Gửi</button>
    </form>
  </main>

  <script>
    const sessionKey = "rice_store_chat_session_id";
    const messagesEl = document.getElementById("messages");
    const composerEl = document.getElementById("composer");
    const inputEl = document.getElementById("messageInput");
    const sendButtonEl = document.getElementById("sendButton");
    const toastEl = document.getElementById("toast");
    let sessionId = localStorage.getItem(sessionKey) || createSessionId();
    let pendingEl = null;

    localStorage.setItem(sessionKey, sessionId);
    addMessage("bot", "Chào bạn, bạn muốn đặt loại gạo nào? Bạn có thể nhắn luôn số kg, địa chỉ giao hàng và SĐT để mình ghi đơn nhanh hơn nhé.");

    document.querySelectorAll("[data-message]").forEach((button) => {
      button.addEventListener("click", () => {
        inputEl.value = button.dataset.message;
        inputEl.focus();
      });
    });

    composerEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = inputEl.value.trim();
      if (!message) {
        return;
      }

      hideToast();
      inputEl.value = "";
      autoResizeInput();
      addMessage("user", message);
      await sendMessage(message);
    });

    inputEl.addEventListener("input", autoResizeInput);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        composerEl.requestSubmit();
      }
    });

    async function sendMessage(message) {
      setBusy(true);
      pendingEl = addMessage("bot pending", "Đang trả lời...");

      try {
        const response = await fetch("/api/chat/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            message
          })
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        const data = await response.json();
        if (data.session_id) {
          sessionId = data.session_id;
          localStorage.setItem(sessionKey, sessionId);
        }
        replacePending(data.reply || "Mình chưa xử lí được tin nhắn này, bạn nhắn lại giúp mình nhé.");
      } catch (error) {
        replacePending("Hiện tại hệ thống đang chập chờn. Bạn thử nhắn lại hoặc gọi 0342504323 giúp mình nhé.");
        showToast("Không gửi được tin nhắn. Kiểm tra kết nối rồi thử lại nhé.");
      } finally {
        setBusy(false);
      }
    }

    function addMessage(type, text) {
      const messageEl = document.createElement("div");
      messageEl.className = `message ${type}`;
      messageEl.textContent = text;
      messagesEl.appendChild(messageEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return messageEl;
    }

    function replacePending(text) {
      if (pendingEl) {
        pendingEl.className = "message bot";
        pendingEl.textContent = text;
        pendingEl = null;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } else {
        addMessage("bot", text);
      }
    }

    function setBusy(isBusy) {
      inputEl.disabled = isBusy;
      sendButtonEl.disabled = isBusy;
      if (!isBusy) {
        inputEl.focus();
      }
    }

    function autoResizeInput() {
      inputEl.style.height = "auto";
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 132)}px`;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
    }

    function hideToast() {
      toastEl.classList.remove("show");
      toastEl.textContent = "";
    }

    function createSessionId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `web-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }
  </script>
</body>
</html>
