name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build JAR
        run: chmod +x mvnw && ./mvnw clean package -DskipTests -q

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/vps_key $VPS_USER@$VPS_HOST 'echo "SSH OK"'
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key $VPS_USER@$VPS_HOST << 'EOF'
            set -e
            cd /opt/ricestore
            git pull origin main
            chmod +x mvnw && ./mvnw clean package -DskipTests -q
            sudo systemctl restart ricestore
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/vps_key
